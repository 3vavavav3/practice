<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Статистика</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Статистика работы отдела обслуживания</h1>

    <div id="userInfo" style="margin-bottom: 10px; padding: 10px; background: #f0f0f0;"></div>
    <div id="stats">... Загрузка ...</div>
    <br>
    <a href="mainPage.html">Вернуться на главную страницу</a>

    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = 'authPage.html';
        }

        document.getElementById('userInfo').innerHTML =
            'Пользователь: ' + currentUser.fio + ' | Роль: ' + currentUser.type;

        if (currentUser.type !== 'Оператор' && currentUser.type !== 'Менеджер') {
            document.getElementById('stats').innerHTML = 'У вас нет прав для просмотра статистики';
        } else {
            loadStatistics();
        }

        async function loadStatistics() {
            try {
                let response = await fetch('/api/statistics?userType=' + currentUser.type);
                let data = await response.json();

                let html = '<p><strong>Количество выполненных заявок:</strong> ' + data.completedCount + '</p>';
                html += '<p><strong>Статистика по типам неисправностей:</strong></p><ul>';

                for (let problem in data.byProblem) {
                    html += `<li>${problem || 'Не указана'}: ${data.byProblem[problem]}</li>`;
                }
                html += '</ul>';

                document.getElementById('stats').innerHTML = html;
            } catch (error) {
                document.getElementById('stats').innerHTML = '<p style="color: red;">Ошибка загрузки статистики</p>';
            }
        }
    </script>
</body>
</html>
