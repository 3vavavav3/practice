<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Редактирование заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Редактирование заявки</h1>

    <div id="userInfo" style="margin-bottom: 10px; padding: 10px; background: #f0f0f0;"></div>

    <label>Статус</label>
    <br>
    <select id="status">
        <option value="Новая заявка">Новая заявка</option>
        <option value="В процессе">В процессе</option>
        <option value="Завершена">Завершена</option>
    </select>
    <br>

    <label>Запчасти</label>
    <br>
    <input type="text" id="repairParts" placeholder="Укажите запчасти" style="width: 300px;">
    <br>

    <div id="masterField">
        <label>Мастер</label>
        <br>
        <select id="master"></select>
        <br>
    </div>

    <button onclick="updateRequest()" style="margin-top: 10px;">Сохранить</button>
    <br>
    <a href="mainPage.html">Вернуться на главную</a>

    <script src="js/messages.js"></script>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        let requestId = new URLSearchParams(window.location.search).get('id');

        if (!currentUser) {
            window.location.href = 'authPage.html';
        }

        document.getElementById('userInfo').innerHTML =
            'Роль: ' + currentUser.type;

        if (currentUser.type !== 'Оператор' && currentUser.type !== 'Менеджер') {
            document.getElementById('masterField').style.display = 'none';
        }

        async function loadMasters() {
            let response = await fetch('/api/users');
            let users = await response.json();
            let masters = users.filter(u => u.type === 'Автомеханик');

            let options = '<option value="">Выберите мастера</option>';
            for (let m of masters) {
                options += `<option value="${m.id}">${m.fio}</option>`;
            }
            document.getElementById('master').innerHTML = options;
        }

        async function loadRequest() {
            let response = await fetch('/api/requests/' + requestId);
            let request = await response.json();

            document.getElementById('status').value = request.requestStatus || '';
            document.getElementById('repairParts').value = request.repairParts || '';

            if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер') {
                await loadMasters();
                document.getElementById('master').value = request.masterId || '';
            }
        }

        async function updateRequest() {
            let data = {
                requestStatus: document.getElementById('status').value,
                repairParts: document.getElementById('repairParts').value
            };

            if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер') {
                data.masterId = document.getElementById('master').value || null;
            }

            let response = await fetch(`/api/requests/${requestId}?userType=${currentUser.type}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showMessage('Заявка обновлена', 'success');
                window.location.href = 'mainPage.html';
            } else {
                showMessage('Ошибка при обновлении', 'error');
            }
        }

        loadRequest();
    </script>
</body>
</html>
