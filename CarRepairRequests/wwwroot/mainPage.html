<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Главная страница</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Автосервис "Автотранс"</h1>

    <div id="userInfo" style="margin-bottom: 10px; padding: 10px; background: #f0f0f0;"></div>

    <label>Поиск заявки</label>
    <br>
    <input type="text" id="searchInput" placeholder="Введите параметры для поиска">
    <button onclick="searchResults()">Найти</button>
    <button onclick="logout()">Выйти из системы</button>
    <br>

    <h2>Меню</h2>
    <p>
        <div id="menuItems"></div>
    </p>

    <h2>Заявки на ремонт</h2>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>Дата создания</th>
                <th>Тип авто</th>
                <th>Модель авто</th>
                <th>Проблема</th>
                <th>Статус</th>
                <th>Дата завершения</th>
                <th>Запчасти</th>
                <th>Мастер</th>
                <th>Клиент</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="requestsTable"></tbody>
    </table>

    <script src="js/messages.js"></script>
    <script>
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));

        if (!currentUser) {
            window.location.href = 'authPage.html';
        }

        document.getElementById('userInfo').innerHTML =
            'Пользователь: ' + currentUser.fio + ' | Роль: ' + currentUser.type;

        let menuHtml = '';
        if (currentUser.type !== 'Автомеханик') {
            menuHtml += '<a href="createRequest.html">Добавление заявки</a><br>';
        }
        if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер') {
            menuHtml += '<a href="statisticPage.html">Просмотр статистики</a><br>';
        }
        document.getElementById('menuItems').innerHTML = menuHtml;

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'authPage.html';
        }

        async function loadRequests() {
            let response = await fetch(`/api/requests?userType=${currentUser.type}&userId=${currentUser.id}`);
            let requests = await response.json();
            let users = await (await fetch('/api/users')).json();

            let html = '';
            for (let r of requests) {
                let client = users.find(u => u.id === r.clientId);
                let master = users.find(u => u.id === r.masterId);
                let startDate = r.startDate ? new Date(r.startDate).toLocaleDateString() : '';
                let completionDate = r.completionDate ? new Date(r.completionDate).toLocaleDateString() : '';

                let buttons = '';
                if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер' ||
                    (currentUser.type === 'Автомеханик' && r.masterId === currentUser.id)) {
                    buttons += `<button onclick="editRequest(${r.id})">Редактировать</button>`;
                }
                if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер') {
                    buttons += `<button onclick="deleteRequest(${r.id})">Удалить</button>`;
                }

                html += `<tr>
                        <td>${startDate}</td>
                        <td>${r.carType || ''}</td>
                        <td>${r.carModel || ''}</td>
                        <td>${r.problemDescription || ''}</td>
                        <td>${r.requestStatus || ''}</td>
                        <td>${completionDate}</td>
                        <td>${r.repairParts || ''}</td>
                        <td>${master ? master.fio : 'Не назначен'}</td>
                        <td>${client ? client.fio : ''}</td>
                        <td>${buttons}</td>
                    </tr>`;
            }
            document.getElementById('requestsTable').innerHTML = html;
        }

        async function deleteRequest(id) {
            if (!confirm('Вы уверены, что хотите удалить заявку?')) return;

            let response = await fetch(`/api/requests/${id}?userType=${currentUser.type}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                showMessage('Заявка удалена', 'success');
                loadRequests();
            } else {
                showMessage('Нет прав для удаления', 'error');
            }
        }

        function editRequest(id) {
            window.location.href = 'editRequest.html?id=' + id;
        }

        async function searchResults() {
            let text = document.getElementById('searchInput').value;
            if (!text) {
                showMessage('Введите текст для поиска', 'warning');
                return;
            }

            let response = await fetch('/api/requests/search?text=' + encodeURIComponent(text));
            let results = await response.json();

            if (currentUser.type === 'Заказчик') {
                results = results.filter(r => r.clientId === currentUser.id);
            } else if (currentUser.type === 'Автомеханик') {
                results = results.filter(r => r.masterId === currentUser.id || r.requestStatus === 'Новая заявка');
            }

            let users = await (await fetch('/api/users')).json();

            let html = '';
            for (let r of results) {
                let client = users.find(u => u.id === r.clientId);
                let master = users.find(u => u.id === r.masterId);
                let startDate = r.startDate ? new Date(r.startDate).toLocaleDateString() : '';

                let buttons = '';
                if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер' ||
                    (currentUser.type === 'Автомеханик' && r.masterId === currentUser.id)) {
                    buttons += `<button onclick="editRequest(${r.id})">Редактировать</button>`;
                }
                if (currentUser.type === 'Оператор' || currentUser.type === 'Менеджер') {
                    buttons += `<button onclick="deleteRequest(${r.id})">Удалить</button>`;
                }

                html += `<tr>
                        <td>${startDate}</td>
                        <td>${r.carType || ''}</td>
                        <td>${r.carModel || ''}</td>
                        <td>${r.problemDescription || ''}</td>
                        <td>${r.requestStatus || ''}</td>
                        <td></td>
                        <td>${r.repairParts || ''}</td>
                        <td>${master ? master.fio : 'Не назначен'}</td>
                        <td>${client ? client.fio : ''}</td>
                        <td>${buttons}</td>
                    </tr>`;
            }

            if (results.length === 0) {
                html = '<tr><td colspan="10">Ничего не найдено</td></tr>';
            }
            document.getElementById('requestsTable').innerHTML = html;
        }

        loadRequests();
    </script>
</body>
</html>
