<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Главная страница</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Автосервис "Автотранс"</h1>
    <label>Поиск заявки</label>
    <br>
    <input type="text" id="searchInput" placeholder="Введите параметры для поиска">
    <button onclick="searchResults()">Найти</button>
    <button onclick="location.href='authPage.html'">Выйти из системы</button>
    <br>
    <h2>Меню</h2>
    <p>
        <a href="createRequest.html">Добавление заявки</a>
        <br>
        <a href="statisticPage.html">Просмотр статистики</a>
        <br>
    </p>
    <h2>Заявки на ремонт автомобилей</h2>
    <table>
        <thead>
            <tr>
                <th>Дата создания</th>
                <th>Тип авто</th>
                <th>Модель авто</th>
                <th>Проблема</th>
                <th>Статус</th>
                <th>Дата завершения</th>
                <th>Запчасти</th>
                <th>Мастер</th>
                <th>Клиент</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="requestsTable">
        </tbody>
    </table>

    <script src="js/messages.js"></script>
    <script>
        async function loadRequests() {
            let response = await fetch('/api/requests')
            let requests = await response.json();

            let tbody = document.getElementById('requestsTable');
            let html = '';

            for (let i = 0; i < requests.length; i++) {
                let r = requests[i];

                let masterName = r.master ? r.master.fio : '';
                let clientName = r.client ? r.client.fio : '';

                html = html + '<tr>' +
                    '<td>' + r.createDate + '</td>' +
                    '<td>' + r.carType + '</td>' +
                    '<td>' + r.carModel + '</td>' +
                    '<td>' + r.problemDescryption + '</td>' +
                    '<td>' + r.requestStatus + '</td>' +
                    '<td>' + (r.completionDate || '') + '</td>' +
                    '<td>' + (r.repairParts || '') + '</td>' +
                    '<td>' + (r.master ? r.master.fio : '') + '</td>' +  
                    '<td>' + (r.client ? r.client.fio : '') + '</td>' +  
                    '<td>' +
                    '<button onclick="editRequest(' + r.id + ')">Редактировать</button>' +
                    '<button onclick="deleteRequest(' + r.id + ')">Удалить</button>' +
                    '</td>' +
                    '</tr>';

            }

            tbody.innerHTML = html;
        }

        

        async function deleteRequest(id) {
            if (!confirmAction("Вы уверены, что хотите удалить заявку?")) {
                return;
            }

            try {
                let response = await fetch('/api/requests/' + id, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showMessage("Заявка удалена", "success");
                    loadRequests(); 
                } else {
                    showMessage("Ошибка при удалении", "error");
                }
            } catch (error) {
                showMessage("Ошибка соединения с сервером", "error");
            }
        }

        function editRequest(id) {
            window.location.href = 'editRequest.html?id' + id;
        }

        async function searchResults() {
            let searchText = document.getElementById('searchInput').value;

            if (!searchText) {
                showMessage("Введите текст для поиска", "warning");
                return;
            }

            let response = await fetch('/api/requests/search?text=' + encodeURIComponent(searchText));
            let results = await response.json();

            let tbody = document.getElementById('requestsTable');

            if (results.length == 0) {
                tbody.innerHTML = '<tr<td colspan="5">Ничего не найдено</td></tr>';
                return;

            }

            let html = '';
            for (let i = 0; i < results.length; i++) {
                let r = results[i];
                html = html + '<tr>' +
                    '<td>' + r.requestNumber + '</td>' +
                    '<td>' + r.model + '</td>' +
                    '<td>' + r.status + '</td>' +
                    '<td>' +
                    '<button onclick="viewRequest(' + r.id + ')">Перейти к заявке</button>' +
                    '</td>' +
                    '</tr>';
            }

            tbody.innerHTML = html;
        }

        loadRequests();

    </script>

</body>
</html>
