<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Регистрация</h1>
    <label>Телефон:</label>
    <br>
    <input type="text" id="phone" placeholder="Введите номер телефона" />
    <br>
    <label>ФИО:</label>
    <br>
    <input type="text" id="name" placeholder="Введите Ваше ФИО">
    <br>
    <label>Логин:</label>
    <br>
    <input type="text" id="username" placeholder="Введите логин" />
    <br>
    <label>Пароль:</label>
    <br>
    <input type="password" id="password" placeholder="Введите пароль" />
    <br>
    <label>Подтверждение пароля:</label>
    <br>
    <input type="password" id="password_check" placeholder="Введите пароль еще раз" />
    <br>
    <br>
    <label>Роль в системе:</label>
    <select name="role" id="role">
        <option value="Заказчик">Заказчик</option>
        <option value="Автомеханик">Автомеханик</option>
        <option value="Оператор">Оператор</option>
        <option value="Менеджер">Менеджер</option>
    </select>
    <br>
    <br>
    <button onclick="reg()">Зарегистрироваться</button>
    <br>
    <a href="authPage.html">Вернуться на страницу авторизации</a>

    <script src="js/messages.js"></script>
    <script>
        function reg() {
            let phone = document.getElementById("phone").value;
            let name = document.getElementById("name").value;
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            let passwordCheck = document.getElementById("password_check").value;
            let role = document.getElementById("role").value;

            if (!phone || !name || !username || !password || !passwordCheck || !role) {
                showMessage("Заполните все поля", "warning");
                return;
            }

            if (password != passwordCheck) {
                showMessage("Пароли не совпадают", "error");
                return;
            }

            if (password.length < 5) {
                showMessage("Пароль должен быть не меньше 5 символов", "warning");
                return;
            }

            let userData = {
                phone: phone,
                fio: name,
                login: username,
                password: password,
                type: role
            };

            fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
                .then(async response => {
                    if (response.ok) {
                        showMessage("Регистрация прошла успешно", "success");
                        setTimeout(() => window.location.href = "authPage.html", 1500);
                    } else {
                        let error = await response.text();
                        showMessage(error || "Ошибка при регистрации", "error");
                    }
                })
                .catch(error => {
                    showMessage("Ошибка соединения с сервером", "error");
                });
        }
    </script>
</body>
</html>
