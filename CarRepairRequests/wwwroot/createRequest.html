<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Создание заявки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <label>Тип авто</label>
    <br>
    <select id="autoType">
        <option value="Легковая">Легковая</option>
        <option value="Грузовая">Грузовая</option>
    </select>
    <br>

    <label>Модель авто</label>
    <br>
    <input type="text" id="model" placeholder="Введите модель авто">
    <br>

    <label>Проблема</label>
    <br>
    <input type="text" id="problem" placeholder="Укажите проблему">
    <br>

    <label>Статус</label>
    <br>
    <select id="status">
        <option value="Новая заявка">Новая заявка</option>
        <option value="В процессе">В процессе</option>
        <option value="Завершена">Завершена</option>
    </select>
    <br>

    <label>Дата завершения</label>
    <br>
    <input type="date" id="completionDate">
    <br>

    <label>Запчасти</label>
    <br>
    <input type="text" id="parts" placeholder="Укажите запчасти">
    <br>

    <label>Мастер</label>
    <br>
    <select id="master"></select>
    <br>

    <button onclick="saveRequest()">Сохранить заявку</button>
    <br>
    <a href="mainPage.html">Вернуться на главную страницу</a>

    <script src="js/messages.js"></script>
    <script>
        async function loadMasters() {
            let response = await fetch('/api/users');
            let users = await response.json();
            let masters = users.filter(u => u.type === "Автомеханик");

            let select = document.getElementById('master');
            let options = '<option value="">Выберите мастера</option>';

            for (let i = 0; i < masters.length; i++) {
                options += '<option value="' + masters[i].id + '">' + masters[i].fio + '</option>';
            }

            select.innerHTML = options;
        }

        async function saveRequest() {
            let currentUser = JSON.parse(localStorage.getItem('currentUser'));

            let requestData = {
                startDate: new Date().toISOString(),
                carType: document.getElementById('autoType').value,
                carModel: document.getElementById('model').value,
                problemDescription: document.getElementById('problem').value,
                requestStatus: document.getElementById('status').value,
                completionDate: document.getElementById('completionDate').value || null,
                repairParts: document.getElementById('parts').value,
                masterId: document.getElementById('master').value || null,
                clientId: currentUser ? currentUser.id : null
            };

            let response = await fetch('/api/requests', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            });

            if (response.ok) {
                showMessage('Заявка создана', 'success');
                window.location.href = 'mainPage.html';
            } else {
                showMessage('Ошибка при создании заявки', 'error');
            }
        }

        loadMasters();
    </script>
</body>
</html>
